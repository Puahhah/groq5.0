<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groq 5.0 Ultra Pro - NesinWasTaken</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --gold: #d4b88e; --bg: #0b0b0b; --sidebar: #121212; 
            --text: #f0f0f0; --text-muted: #a0a0a0; --msg-user: #006b52;
            --msg-ai: #262d31; --border: rgba(255,255,255,0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.theme-ocean { --gold: #00d2ff; --msg-user: #004e92; --bg: #000428; }
        body.theme-lava { --gold: #ff416c; --msg-user: #900c3f; --bg: #0f0000; }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none !important; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; transition: background 0.5s ease; }

        /* Sidebar Animasyonlu */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; z-index: 1000; transition: var(--transition); }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -300px; height: 100%; box-shadow: 10px 0 30px #000; } .sidebar.active { left: 0; } }

        .logo-text { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 3px; font-size: 1.1rem; text-align: center; margin-bottom: 30px; animation: pulse 3s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; text-shadow: 0 0 10px var(--gold); } 100% { opacity: 0.8; } }

        .new-chat-btn { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; width: 100%; transition: var(--transition); }
        .new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,184,142,0.3); }
        
        .history-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .history-item { padding: 12px; margin-bottom: 8px; border-radius: 10px; background: rgba(255,255,255,0.03); font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: var(--transition); }
        .history-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.07); transform: translateX(5px); }
        .delete-chat { color: #ff4444; padding: 5px; opacity: 0.3; transition: 0.2s; }
        .delete-chat:hover { opacity: 1; transform: scale(1.2); }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #chat-flow { flex: 1; padding: 30px 15% 150px; overflow-y: auto; display: none; flex-direction: column; gap: 20px; transition: var(--transition); }
        @media (max-width: 768px) { #chat-flow { padding: 70px 15px 150px; } }

        .msg { max-width: 85%; padding: 18px; border-radius: 20px; line-height: 1.6; animation: msgFade 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .user-box { align-self: flex-end; background: var(--msg-user); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ai-box { align-self: flex-start; background: var(--msg-ai); border-left: 4px solid var(--gold); border-bottom-left-radius: 4px; position: relative; }

        .bottom-area { position: absolute; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(to top, var(--bg) 70%, transparent); transition: 0.3s; }
        .input-wrap { max-width: 800px; margin: 0 auto; background: #1e1e1e; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); transition: var(--transition); }
        .input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,184,142,0.1); }
        input#userInput { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 1rem; }
        
        /* Modal Yumuşak Geçiş */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: #181818; width: 90%; max-width: 400px; border-radius: 30px; padding: 35px; border: 1px solid var(--gold); transform: scale(1); transition: var(--transition); }

        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 1500; background: var(--gold); border: none; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
        
        /* Baloncuklar Solda */
        .typing-container { align-self: flex-start; margin-left: 10px; display: flex; align-items: center; gap: 8px; background: var(--msg-ai); padding: 12px 20px; border-radius: 20px; border-left: 4px solid var(--gold); }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-8px); opacity: 1; } }
    </style>
</head>
<body onload="initApp()">

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
    <div class="logo-text">GROQ 5.0 PRO</div>
    <button class="new-chat-btn" onclick="startNewChat()">+ YENİ SOHBET</button>
    <div class="history-list" id="historyList"></div>
    <div style="cursor:pointer; padding:15px; border-top:1px solid var(--border); color:var(--gold); text-align: center; font-weight: bold; font-size: 0.9rem;" onclick="toggleModal(true)">⚙️ AYARLAR VE TEMA</div>
</div>

<div class="main">
    <div id="chat-dashboard" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; padding: 20px; animation: msgFade 0.8s ease;">
        <h1 id="welcomeTitle" style="font-family:'Orbitron'; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--gold); margin: 0;">GROQ 5.0 PRO</h1>
        <p style="color:var(--text-muted); letter-spacing: 5px; font-size: 0.8rem; margin-top: 15px; opacity: 0.7;">NESINWASTAKEN PREMİUM</p>
    </div>
    
    <div id="chat-flow"></div>
    
    <div class="bottom-area">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Bir mesaj yazın..." autocomplete="off">
            <button onclick="handleSend()" style="background:var(--gold); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; margin-left:10px; font-weight: bold; transition: 0.3s;">➔</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target==this) toggleModal(false)">
    <div class="modal">
        <h2 style="color:var(--gold); margin-bottom:25px; font-family: 'Orbitron'; text-align: center; letter-spacing: 2px;">PANEL</h2>
        
        <label style="color:var(--text-muted); font-size: 0.75rem; display: block; margin-bottom: 8px; font-weight: bold;">KULLANICI ADI</label>
        <input type="text" id="setUserName" style="background:rgba(0,0,0,0.3); border:1px solid var(--border); color:#fff; padding:14px; width:100%; border-radius:12px; margin-bottom:20px;">
        
        <label style="color:var(--text-muted); font-size: 0.75rem; display: block; margin-bottom: 8px; font-weight: bold;">TEMA</label>
        <select id="setTheme" onchange="updateTheme(this.value)" style="background:rgba(0,0,0,0.3); border:1px solid var(--border); color:#fff; padding:14px; width:100%; border-radius:12px; margin-bottom:20px;">
            <option value="default">Karanlık Altın</option>
            <option value="theme-ocean">Derin Okyanus</option>
            <option value="theme-lava">Volkanik Lav</option>
        </select>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; padding: 0 5px;">
            <label style="color:var(--text); font-weight: 600; font-size: 0.9rem;">SESLİ YANIT SİSTEMİ</label>
            <input type="checkbox" id="setTTS" style="width:22px; height:22px; accent-color:var(--gold); cursor:pointer;">
        </div>

        <button class="new-chat-btn" onclick="saveSettings()" style="margin-bottom:12px;">AYARLARI UYGULA</button>
        <button onclick="clearAll()" style="background:transparent; color:#ff4444; border:1px solid #ff4444; padding:12px; width:100%; border-radius:12px; cursor:pointer; font-weight:bold; font-size: 0.8rem; transition: 0.3s;">TÜM BELLEĞİ TEMİZLE</button>
    </div>
</div>

<script>
    const G_KEY = "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";
    let history = [];
    let savedChats = JSON.parse(localStorage.getItem('groq_v5_pro_chats')) || [];
    let currentId = null;

    function initApp() {
        const name = localStorage.getItem('g_user') || "Gezgin";
        document.getElementById('setUserName').value = name;
        document.getElementById('welcomeTitle').innerText = "SELAM, " + name.toUpperCase();
        document.getElementById('setTTS').checked = localStorage.getItem('g_tts') === 'true';
        updateTheme(localStorage.getItem('g_theme') || 'default');
        renderHistory();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function toggleModal(s) { document.getElementById('settingsModal').style.display = s ? 'flex' : 'none'; }
    
    function saveSettings() {
        const name = document.getElementById('setUserName').value || "Gezgin";
        localStorage.setItem('g_user', name);
        localStorage.setItem('g_tts', document.getElementById('setTTS').checked);
        document.getElementById('welcomeTitle').innerText = "SELAM, " + name.toUpperCase();
        toggleModal(false);
    }

    function updateTheme(v) { document.body.className = v; localStorage.setItem('g_theme', v); }

    async function handleSend() {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if(!text) return;

        window.speechSynthesis.cancel();
        document.getElementById('chat-dashboard').style.display = 'none';
        document.getElementById('chat-flow').style.display = 'flex';
        
        addMsg("user", text);
        inp.value = "";
        
        const f = document.getElementById('chat-flow');
        const lId = "L" + Date.now();
        const lDiv = document.createElement('div');
        lDiv.className = 'typing-container';
        lDiv.id = lId;
        lDiv.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
        f.appendChild(lDiv);
        f.scrollTop = f.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${G_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: "Sen NesinWasTaken tarafından yaratılmış, samimi, akıllı ve kısa cevaplar veren bir asistansın." },
                        ...history,
                        { role: "user", content: text }
                    ],
                    temperature: 0.6
                })
            });

            const data = await response.json();
            const aiRes = data.choices[0].message.content;
            lDiv.remove();
            addMsg("ai", aiRes);
            
            if(document.getElementById('setTTS').checked) {
                const ut = new SpeechSynthesisUtterance(aiRes);
                ut.lang = 'tr-TR';
                window.speechSynthesis.speak(ut);
            }

            history.push({ role: "user", content: text }, { role: "assistant", content: aiRes });
            saveChat();
        } catch (e) {
            lDiv.innerHTML = "❌ Bağlantı hatası.";
        }
    }

    function addMsg(role, text) {
        const f = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${role === 'user' ? 'user-box' : 'ai-box'}`;
        d.innerHTML = role === 'ai' ? marked.parse(text) : text;
        f.appendChild(d);
        f.scrollTo({ top: f.scrollHeight, behavior: 'smooth' });
    }

    function saveChat() {
        if(!currentId) currentId = Date.now();
        const title = history[0].content.substring(0, 18);
        const idx = savedChats.findIndex(c => c.id === currentId);
        if(idx > -1) savedChats[idx].messages = [...history];
        else savedChats.unshift({ id: currentId, title, messages: [...history] });
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
    }

    function renderHistory() {
        const l = document.getElementById('historyList');
        l.innerHTML = "";
        savedChats.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span onclick="loadChat(${i})" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">💬 ${c.title}...</span>
                <span class="delete-chat" onclick="deleteSingleChat(event, ${i})">🗑️</span>
            `;
            l.appendChild(div);
        });
    }

    // ARTIK SORMADAN SİLİYOR
    function deleteSingleChat(e, i) {
        e.stopPropagation();
        if(savedChats[i].id === currentId) startNewChat();
        savedChats.splice(i, 1);
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
    }

    function loadChat(i) {
        const c = savedChats[i];
        currentId = c.id; history = [...c.messages];
        document.getElementById('chat-dashboard').style.display = 'none';
        const f = document.getElementById('chat-flow');
        f.style.display = 'flex'; f.innerHTML = "";
        history.forEach(m => addMsg(m.role, m.content));
        if(window.innerWidth < 768) toggleSidebar();
    }

    function startNewChat() {
        history = []; currentId = null;
        document.getElementById('chat-flow').innerHTML = "";
        document.getElementById('chat-flow').style.display = 'none';
        document.getElementById('chat-dashboard').style.display = 'flex';
        if(window.innerWidth < 768) toggleSidebar();
    }

    function clearAll() {
        localStorage.removeItem('groq_v5_pro_chats');
        savedChats = [];
        renderHistory();
        startNewChat();
        toggleModal(false);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
