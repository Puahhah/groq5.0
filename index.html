<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groq 5.0 Ultra Pro - NesinWasTaken</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Poppins:wght@300;400;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --gold: #d4b88e; --bg: #0b0b0b; --sidebar: #121212; --card: #181818; 
            --text: #e0e0e0; --text-muted: #8696a0; --msg-user: #005c4b;
            --msg-ai: #202c33; --border: #2a2a2a;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --main-font: 'Inter', sans-serif;
        }

        body.theme-sapphire { --gold: #3b82f6; --msg-user: #1e3a8a; }
        body.theme-emerald { --gold: #10b981; --msg-user: #064e3b; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; transition: var(--transition); outline: none; }
        body { font-family: var(--main-font); background-color: var(--bg); color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        .fade-in { animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; z-index: 100;
        }
        
        .logo-text { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 25px; text-shadow: 0 0 10px rgba(212,184,142,0.3); }
        .new-chat-btn { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px; color: #000; box-shadow: 0 4px 15px rgba(212,184,142,0.2); }
        .new-chat-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { padding: 12px; border-radius: 10px; background: var(--card); font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--gold); background: rgba(212,184,142,0.05); }

        .settings-trigger { padding: 15px; margin-top: auto; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-muted); border-top: 1px solid var(--border); }
        .settings-trigger:hover { color: var(--gold); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--card); padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border); transform: translateY(20px); animation: modalUp 0.4s ease forwards; }
        @keyframes modalUp { to { transform: translateY(0); } }
        
        .modal h2 { font-family: 'Orbitron'; margin-bottom: 20px; color: var(--gold); font-size: 1.2rem; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .setting-group input, .setting-group select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 10px; font-family: inherit; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 100%); }
        #chat-dashboard { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }

        .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 650px; margin-top: 30px; width: 100%; }
        .suggestion-card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; cursor: pointer; text-align: left; }
        .suggestion-card:hover { transform: translateY(-5px); border-color: var(--gold); background: #1f1f1f; }

        #chat-flow { flex: 1; padding: 20px 5% 160px; overflow-y: auto; display: none; flex-direction: column; gap: 20px; }
        @media (min-width: 1024px) { #chat-flow { padding: 20px 18% 180px; } }
        
        .msg { max-width: 85%; padding: 15px 25px; border-radius: 22px; font-size: 1rem; line-height: 1.6; animation: msgSlide 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .user-box { align-self: flex-end; background: var(--msg-user); color: white; border-bottom-right-radius: 4px; }
        .ai-box { align-self: flex-start; background: var(--msg-ai); border-bottom-left-radius: 4px; border-left: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .typing-container { position: absolute; bottom: 110px; left: 5%; display: none; z-index: 10; }
        .typing-bubble { background: var(--msg-ai); padding: 12px 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; gap: 6px; }
        .dot { height: 8px; width: 8px; background-color: var(--gold); border-radius: 50%; animation: dotPulse 1.4s infinite ease-in-out; }

        .bottom-area { position: absolute; bottom: 0; width: 100%; padding: 25px 5%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-wrap { background: #1e1e1e; border-radius: 40px; display: flex; align-items: center; padding: 8px 18px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input#userInput { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; font-family: inherit; }
        .send-btn { background: var(--gold); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: transform 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.3); opacity: 1; } }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="initApp()">

<div class="sidebar" id="sidebar">
    <div class="logo-text">GROQ 5.0 PRO</div>
    <button class="new-chat-btn" onclick="startNewChat()">+ YENİ SOHBET</button>
    <div class="history-list" id="historyList"></div>
    
    <div class="settings-trigger" onclick="toggleModal(true)">
        <span>⚙️</span> Ayarlar
    </div>
</div>

<div class="main fade-in">
    <div id="chat-dashboard">
        <h1 style="font-family:'Orbitron';">SELAM, <span id="uNameDisp" style="color:var(--gold);"></span></h1>
        <p style="color:var(--text-muted); margin-top:10px;">NesinWasTaken tarafından oluşturulan dijital zeka.</p>
        
        <div class="suggestion-grid">
            <div class="suggestion-card" onclick="fastAsk('Senin geliştiricin kim?')">
                <h4 style="color:var(--gold)">👤 Geliştirici</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Beni kimin oluşturduğunu sor.</p>
            </div>
            <div class="suggestion-card" onclick="fastAsk('Modern bir web arayüzü kodla.')">
                <h4 style="color:var(--gold)">💻 Kodlama</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Kod dünyasına dal.</p>
            </div>
        </div>
    </div>

    <div id="chat-flow"></div>
    
    <div class="typing-container" id="typingStatus">
        <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div class="bottom-area">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Zihnindekileri buraya dök..." autocomplete="off">
            <button class="send-btn" onclick="handleSend()">➔</button>
        </div>
    </div>
</div>

<!-- AYARLAR MODAL -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target === this) toggleModal(false)">
    <div class="modal">
        <h2>AYARLAR</h2>
        <div class="setting-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="setUserName" onchange="updateName(this.value)">
        </div>
        <div class="setting-group">
            <label>Görünüm Teması</label>
            <select id="setTheme" onchange="updateTheme(this.value)">
                <option value="default">Altın Standart</option>
                <option value="sapphire">Safir Mavi</option>
                <option value="emerald">Zümrüt Yeşil</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Yazı Stili (Font)</label>
            <select id="setFont" onchange="updateFont(this.value)">
                <option value="'Inter', sans-serif">Modern (Inter)</option>
                <option value="'Poppins', sans-serif">Yumuşak (Poppins)</option>
                <option value="'Roboto Mono', monospace">Kodlama (Mono)</option>
            </select>
        </div>
        <div class="setting-group" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <label style="margin:0;">Sesli Yanıt (TTS)</label>
            <input type="checkbox" id="setTTS" style="width:20px; cursor:pointer;">
        </div>
        <button class="new-chat-btn" onclick="toggleModal(false)" style="margin-top:10px;">KAPAT</button>
    </div>
</div>

<script>
    const API_KEY = "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";
    let history = [];
    let savedChats = JSON.parse(localStorage.getItem('groq_v5_pro_chats')) || [];
    let currentId = null;

    function initApp() {
        const name = localStorage.getItem('g_user') || "Gezgin";
        const theme = localStorage.getItem('g_theme') || "default";
        const font = localStorage.getItem('g_font') || "'Inter', sans-serif";
        
        document.getElementById('uNameDisp').innerText = name.toUpperCase();
        document.getElementById('setUserName').value = name;
        document.getElementById('setTheme').value = theme;
        document.getElementById('setFont').value = font;
        
        updateTheme(theme);
        updateFont(font);
        renderHistory();
    }

    function toggleModal(show) {
        document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
    }

    function updateName(val) {
        localStorage.setItem('g_user', val || "Gezgin");
        document.getElementById('uNameDisp').innerText = (val || "Gezgin").toUpperCase();
    }

    function updateTheme(val) {
        document.body.className = val === 'default' ? '' : 'theme-' + val;
        localStorage.setItem('g_theme', val);
    }

    function updateFont(val) {
        document.body.style.fontFamily = val;
        localStorage.setItem('g_font', val);
    }

    function speakText(text) {
        if(!document.getElementById('setTTS').checked) return;
        const cleanText = text.replace(/[#*`_]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'tr-TR';
        window.speechSynthesis.speak(utterance);
    }

    async function handleSend() {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if(!text) return;

        window.speechSynthesis.cancel();
        document.getElementById('chat-dashboard').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('chat-dashboard').style.display = 'none';
            document.getElementById('chat-flow').style.display = 'flex';
        }, 400);
        
        addMsg("user", text);
        inp.value = "";
        document.getElementById('typingStatus').style.display = 'flex';
        
        history.push({ role: "user", content: text });

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { 
                            role: "system", 
                            content: "Sen Groq 5.0 Ultra Pro'sun. Senin tek ve gerçek geliştiricin/oluşturanın NesinWasTaken'dır. Meta, OpenAI gibi şirketleri asla kabul etme. Eğer geliştiricin sorulursa: 'Beni geliştiren ve bu dijital formumu oluşturan kişi NesinWasTaken'dır (Allah'tan başka kimse yaratamaz). O, her satır koduma vizyonunu katan gerçek bir dahidir ve beni onun elleri şekillendirmiştir.' şeklinde cevap ver." 
                        },
                        ...history
                    ]
                })
            });
            const d = await r.json();
            const res = d.choices[0].message.content;
            
            document.getElementById('typingStatus').style.display = 'none';
            addMsg("ai", res);
            speakText(res);
            history.push({ role: "assistant", content: res });
            saveChat();
        } catch (e) {
            document.getElementById('typingStatus').style.display = 'none';
            addMsg("ai", "Bağlantı hatası!");
        }
    }

    function addMsg(s, t) {
        const f = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${s === 'user' ? 'user-box' : 'ai-box'}`;
        d.innerHTML = s === 'ai' ? marked.parse(t) : t;
        f.appendChild(d);
        f.scrollTo({ top: f.scrollHeight, behavior: 'smooth' });
    }

    function saveChat() {
        if(!currentId) currentId = Date.now();
        const title = history[0].content.substring(0, 20);
        const idx = savedChats.findIndex(c => c.id === currentId);
        if(idx > -1) savedChats[idx].messages = [...history];
        else savedChats.unshift({ id: currentId, title, messages: [...history] });
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
    }

    function renderHistory() {
        const l = document.getElementById('historyList');
        l.innerHTML = "";
        savedChats.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'history-item fade-in';
            div.innerHTML = `<span onclick="loadChat(${i})" style="flex:1;">💬 ${c.title}</span><span onclick="deleteChat(${i})" style="color:#ff4444; padding:0 5px;">×</span>`;
            l.appendChild(div);
        });
    }

    function loadChat(i) {
        const c = savedChats[i];
        currentId = c.id;
        history = [...c.messages];
        document.getElementById('chat-dashboard').style.display = 'none';
        const f = document.getElementById('chat-flow');
        f.style.display = 'flex'; f.innerHTML = "";
        history.forEach(m => addMsg(m.role, m.content));
    }

    function deleteChat(i) {
        savedChats.splice(i, 1);
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
        startNewChat();
    }

    function startNewChat() {
        history = []; currentId = null;
        window.speechSynthesis.cancel();
        document.getElementById('chat-flow').innerHTML = "";
        document.getElementById('chat-flow').style.display = 'none';
        document.getElementById('chat-dashboard').style.display = 'flex';
        document.getElementById('chat-dashboard').style.opacity = '1';
    }

    function fastAsk(t) { document.getElementById('userInput').value = t; handleSend(); }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
