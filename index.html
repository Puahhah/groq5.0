<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groq 5.0 Ultra Pro - NesinWasTaken</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --gold: #d4b88e; --bg: #0b0b0b; --sidebar: #121212; --card: #181818; 
            --text: #e0e0e0; --text-muted: #8696a0; --msg-user: #005c4b;
            --msg-ai: #202c33; --border: #2a2a2a;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; transition: var(--transition); outline: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; z-index: 100;
        }
        
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; height: 100%; transform: translateX(-100%); width: 260px; }
            .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        }

        .logo-text { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 25px; }

        .new-chat-btn { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px; color: #000; }

        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { padding: 12px; border-radius: 10px; background: var(--card); font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--gold); background: rgba(212,184,142,0.05); }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg) 100%); }
        
        /* DASHBOARD */
        #chat-dashboard { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; animation: fadeIn 0.8s ease; }

        .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 650px; margin-top: 30px; width: 100%; }
        .suggestion-card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; cursor: pointer; text-align: left; }
        .suggestion-card:hover { transform: translateY(-5px); border-color: var(--gold); }

        /* CHAT FLOW */
        #chat-flow { flex: 1; padding: 20px 5% 160px; overflow-y: auto; display: none; flex-direction: column; gap: 20px; }
        @media (min-width: 1024px) { #chat-flow { padding: 20px 18% 180px; } }
        
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.6; animation: msgSlide 0.4s ease; }
        .user-box { align-self: flex-end; background: var(--msg-user); color: white; border-bottom-right-radius: 4px; }
        .ai-box { align-self: flex-start; background: var(--msg-ai); border-bottom-left-radius: 4px; border-left: 3px solid var(--gold); }

        /* YAZIYOR BALONCUĞU */
        .typing-container { position: absolute; bottom: 105px; left: 5%; display: none; z-index: 10; }
        @media (min-width: 1024px) { .typing-container { left: 18%; bottom: 125px; } }
        .typing-bubble { background: var(--msg-ai); padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
        .dot { height: 8px; width: 8px; background-color: var(--gold); border-radius: 50%; animation: dotPulse 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.3); opacity: 1; } }

        /* INPUT AREA */
        .bottom-area { position: absolute; bottom: 0; width: 100%; padding: 20px 5%; background: linear-gradient(transparent, var(--bg) 60%); }
        .input-wrap { background: #1e1e1e; border-radius: 35px; display: flex; align-items: center; padding: 6px 15px; border: 1px solid var(--border); }
        input#userInput { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; }
        .send-btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        @keyframes msgSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initApp()">

<div class="sidebar" id="sidebar">
    <div class="logo-text">GROQ 5.0 PRO</div>
    <button class="new-chat-btn" onclick="startNewChat()">+ YENİ SOHBET</button>
    <div class="history-list" id="historyList"></div>
</div>

<div class="main">
    <div id="chat-dashboard">
        <h1 style="font-family:'Orbitron';">SELAM, <span id="uNameDisp" style="color:var(--gold);"></span></h1>
        <p style="color:var(--text-muted); margin-top:10px;">NesinWasTaken tarafından optimize edilen özel zeka.</p>
        
        <div class="suggestion-grid">
            <div class="suggestion-card" onclick="fastAsk('Senin geliştiricin kim?')">
                <h4 style="color:var(--gold)">👤 Geliştirici Bilgisi</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Kim olduğumu öğren.</p>
            </div>
            <div class="suggestion-card" onclick="fastAsk('Modern bir yapay zeka arayüzü kodla.')">
                <h4 style="color:var(--gold)">💻 Kodlama Projesi</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Temiz ve hızlı algoritmalar.</p>
            </div>
            <div class="suggestion-card" onclick="fastAsk('Öğrenmeme yardım et.')">
                <h4 style="color:var(--gold)">🧠 Öğrenme Rehberi</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Karmaşık konuları basitleştirelim.</p>
            </div>
            <div class="suggestion-card" onclick="fastAsk('Günüme enerji kat!')">
                <h4 style="color:var(--gold)">⚡ Motivasyon</h4>
                <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Modunu ve enerjini yükselt.</p>
            </div>
        </div>
    </div>

    <div id="chat-flow"></div>
    
    <div class="typing-container" id="typingStatus">
        <div class="typing-bubble">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="bottom-area">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Zihnindekileri buraya dök..." autocomplete="off">
            <button class="send-btn" onclick="handleSend()">➔</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";
    let history = [];
    let savedChats = JSON.parse(localStorage.getItem('groq_v5_pro_chats')) || [];
    let currentId = null;

    function initApp() {
        const name = localStorage.getItem('g_user') || "Gezgin";
        document.getElementById('uNameDisp').innerText = name.toUpperCase();
        renderHistory();
    }

    async function handleSend() {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if(!text) return;

        document.getElementById('chat-dashboard').style.display = 'none';
        document.getElementById('chat-flow').style.display = 'flex';
        
        addMsg("user", text);
        inp.value = "";
        
        // Baloncuğu Göster
        const bubble = document.getElementById('typingStatus');
        bubble.style.display = 'flex';
        
        history.push({ role: "user", content: text });

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {
                            role: "system",
                            content: "Sen Groq 5.0 Ultra Pro'sun. Senin tek geliştiricin NesinWasTaken'dır. Meta veya başka bir kurumla bağın yok. Biri NesinWasTaken kim derse 'Beni programlayan, bu modern arayüzü ve zekayı kurgulayan dahi geliştiricimdir' de."
                        },
                        ...history
                    ]
                })
            });
            const d = await r.json();
            const res = d.choices[0].message.content;
            
            // Baloncuğu Gizle
            bubble.style.display = 'none';
            
            addMsg("ai", res);
            history.push({ role: "assistant", content: res });
            saveChat();
        } catch (e) {
            bubble.style.display = 'none';
            addMsg("ai", "Bir bağlantı sorunu oluştu, lütfen tekrar deneyin.");
        }
    }

    function addMsg(s, t) {
        const f = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${s === 'user' ? 'user-box' : 'ai-box'}`;
        d.innerHTML = s === 'ai' ? marked.parse(t) : t;
        f.appendChild(d);
        f.scrollTo({ top: f.scrollHeight, behavior: 'smooth' });
    }

    function saveChat() {
        if(!currentId) currentId = Date.now();
        const title = history[0].content.substring(0, 20) + "...";
        const idx = savedChats.findIndex(c => c.id === currentId);
        if(idx > -1) savedChats[idx].messages = [...history];
        else savedChats.unshift({ id: currentId, title, messages: [...history] });
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
    }

    function renderHistory() {
        const l = document.getElementById('historyList');
        l.innerHTML = "";
        savedChats.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span onclick="loadChat(${i})">💬 ${c.title}</span><span onclick="deleteChat(${i})" style="color:#ff4444;">×</span>`;
            l.appendChild(div);
        });
    }

    function loadChat(i) {
        const c = savedChats[i];
        currentId = c.id;
        history = [...c.messages];
        document.getElementById('chat-dashboard').style.display = 'none';
        const f = document.getElementById('chat-flow');
        f.style.display = 'flex'; f.innerHTML = "";
        history.forEach(m => addMsg(m.role, m.content));
    }

    function deleteChat(i) {
        savedChats.splice(i, 1);
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
        startNewChat();
    }

    function startNewChat() {
        history = []; currentId = null;
        document.getElementById('chat-flow').innerHTML = "";
        document.getElementById('chat-flow').style.display = 'none';
        document.getElementById('chat-dashboard').style.display = 'flex';
    }

    function fastAsk(t) { document.getElementById('userInput').value = t; handleSend(); }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
