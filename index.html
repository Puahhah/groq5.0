<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq 5.0 Ultra - NesinWasTaken</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4b88e; --bg: #050505; --sidebar: #0f0f0f; --card: #161616; --green: #00ff88; --red: #ff4444; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* --- SOL PANEL --- */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .logo-area { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron'; font-size: 1.6rem; color: var(--gold); text-shadow: 0 0 15px rgba(212, 184, 142, 0.4); }
        
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-btn { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; color: #aaa; border: none; background: transparent; width: 100%; text-align: left; font-size: 0.9rem; }
        .nav-btn:hover { background: #1a1a1a; color: #fff; transform: translateX(5px); }

        /* --- ANA CHAT ALANI --- */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        #chat-flow { flex: 1; padding: 40px 18%; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; scrollbar-width: thin; }
        
        .msg { position: relative; max-width: 90%; animation: slideUp 0.3s ease forwards; opacity: 0; display: flex; flex-direction: column; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-box { align-self: flex-end; background: #1a1a1a; border: 1px solid #333; padding: 12px 18px; border-radius: 18px 18px 0 18px; color: var(--gold); margin-bottom: 5px; }
        .ai-box { align-self: flex-start; border-left: 3px solid var(--gold); padding: 10px 15px; color: #e0e0e0; line-height: 1.6; background: rgba(255,255,255,0.03); border-radius: 0 15px 15px 15px; }
        
        /* --- ALT GİRİŞ --- */
        .bottom-area { padding: 20px 18%; background: linear-gradient(transparent, var(--bg)); }
        .input-wrap { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; display: flex; align-items: center; padding: 5px 15px; }
        .input-wrap input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        .send-btn { background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; }

        /* Ayarlar Modalı */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(5px); }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 1px solid var(--gold); padding: 30px; border-radius: 20px; min-width: 350px; }
    </style>
</head>
<body>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2 style="color:var(--gold); font-family:'Orbitron';">AYARLAR</h2>
        <div style="margin: 15px 0; display:flex; justify-content:space-between;"><span>Sesli Yanıt</span> <input type="checkbox" id="voiceToggle"></div>
        <div style="margin: 15px 0; display:flex; justify-content:space-between;"><span>Hafıza</span> <input type="checkbox" id="memoryToggle" checked></div>
        <button class="nav-btn" style="background:var(--gold); color:black; font-weight:bold; justify-content:center;" onclick="toggleSettings()">KAPAT</button>
    </div>
</div>

<div class="sidebar">
    <div class="logo-area">
        <div class="logo">GROQ 5.0</div>
        <div style="font-size:0.6rem; color:#d4b88e; margin-top:5px;">BY NESINWASTAKEN</div>
    </div>
    <div class="nav-menu">
        <button class="nav-btn" onclick="clearChat()">🗑️ Sohbeti Temizle</button>
        <button class="nav-btn" onclick="exportChat()">💾 Sohbeti Kaydet</button>
        <button class="nav-btn" onclick="toggleSettings()">⚙️ Ayarlar</button>
    </div>
</div>

<div class="main">
    <div id="chat-flow">
        <div class="msg">
            <div class="ai-box">
                <b>Sistem Çevrimiçi.</b><br>
                Merhaba! Ben NesinWasTaken tarafından optimize edilen özel asistanın. Her şey hazır, neyi çözelim?
            </div>
        </div>
    </div>

    <div class="bottom-area">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Bir şeyler sor..." autofocus>
            <button class="send-btn" onclick="askAI()">➔</button>
        </div>
        <div style="text-align:center; font-size:0.6rem; color:#444; margin-top:10px;">NesinWasTaken Ultra Intelligence v5.2</div>
    </div>
</div>

<script>
    // API ANAHTARI (Doğrudan Yerleştirildi)
    const API_KEY = "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"; 

    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('userInput');
    
    // Hafıza için sistem mesajı
    let chatHistory = [
        { role: "system", content: "Senin adın Groq 5.0 Ultra. NesinWasTaken tarafından geliştirildin. Kısa, teknik ve zekice cevaplar ver." }
    ];

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });

    async function askAI() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage("user", text);
        userInput.value = "";
        
        if(document.getElementById('memoryToggle').checked) {
            chatHistory.push({ role: "user", content: text });
        }

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_KEY}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory.slice(-10), // Son 10 mesaj hafızası
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const err = await response.json();
                console.error("API Hatası:", err);
                throw new Error("Bağlantı Hatası");
            }

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;
            
            chatHistory.push({ role: "assistant", content: aiResponse });
            addMessage("ai", aiResponse);

            if(document.getElementById('voiceToggle').checked) { speak(aiResponse); }

        } catch (error) {
            console.error("Hata Detayı:", error);
            addMessage("ai", "❌ Bağlantı hatası. Tarayıcı eklentisini (CORS) aktif ettiğinden veya internetini kontrol ettiğinden emin ol.");
        }
    }

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg`;
        
        if (sender === 'user') {
            div.innerHTML = `<div class="user-box">${text}</div>`;
        } else {
            const safeText = text.replace(/\n/g, '<br>');
            div.innerHTML = `
                <div class="ai-box">
                    <b>AI:</b><br>${safeText}<br>
                    <span style="font-size:0.7rem; color:var(--gold); cursor:pointer; display:inline-block; margin-top:10px;" 
                          onclick="speak(\`${text.replace(/`/g, "'")}\`)">🔊 Sesli Oku</span>
                </div>`;
        }
        
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    function toggleSettings() {
        const m = document.getElementById('settingsModal');
        m.style.display = (m.style.display === "block") ? "none" : "block";
    }

    function clearChat() { 
        chatFlow.innerHTML = ""; 
        chatHistory = [{ role: "system", content: "Senin adın Groq 5.0 Ultra..." }]; 
    }
    
    function exportChat() {
        const text = chatHistory.map(m => `${m.role}: ${m.content}`).join('\n');
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'sohbet.txt';
        a.click();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'tr-TR';
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
