<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groq 5.0 Ultra Pro - NesinWasTaken</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --gold: #d4b88e; --bg: #0b0b0b; --sidebar: #121212; 
            --text: #f0f0f0; --text-muted: #a0a0a0; --msg-user: #006b52;
            --msg-ai: #262d31; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none !important; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: -300px; height: 100%; box-shadow: 10px 0 30px #000; transition: 0.3s; } .sidebar.active { left: 0; } }
        .logo-text { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 3px; font-size: 1.1rem; text-align: center; margin-bottom: 30px; }
        .new-chat-btn { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; width: 100%; }
        .history-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .history-item { padding: 12px; margin-bottom: 8px; border-radius: 10px; background: rgba(255,255,255,0.03); font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--gold); }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-dashboard { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
        #chat-flow { flex: 1; padding: 30px 15% 150px; overflow-y: auto; display: none; flex-direction: column; gap: 20px; }
        @media (max-width: 768px) { #chat-flow { padding: 70px 15px 150px; } }
        .msg { max-width: 85%; padding: 18px; border-radius: 20px; line-height: 1.6; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user-box { align-self: flex-end; background: var(--msg-user); color: #fff; border-bottom-right-radius: 4px; }
        .ai-box { align-self: flex-start; background: var(--msg-ai); border-left: 4px solid var(--gold); border-bottom-left-radius: 4px; }
        .bottom-area { position: absolute; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .input-wrap { max-width: 800px; margin: 0 auto; background: #1e1e1e; border-radius: 25px; display: flex; align-items: center; padding: 8px 20px; border: 1px solid var(--border); }
        input#userInput { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; font-size: 1rem; }
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 1500; background: var(--gold); border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
    </style>
</head>
<body onload="initApp()">

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
    <div class="logo-text">GROQ 5.0 PRO</div>
    <button class="new-chat-btn" onclick="startNewChat()">+ YENİ SOHBET</button>
    <div class="history-list" id="historyList"></div>
    <div style="cursor:pointer; padding:10px; color:var(--gold); text-align: center; font-size: 0.8rem; opacity: 0.6;" onclick="clearAll()">GEÇMİŞİ TEMİZLE</div>
</div>

<div class="main">
    <div id="chat-dashboard">
        <h1 style="font-family:'Orbitron'; font-size: 3.5rem; color: var(--gold); margin: 0;">GROQ 5.0 PRO</h1>
        <p style="color:var(--text-muted); letter-spacing: 4px; font-size: 0.9rem; margin-top: 10px;">NESINWASTAKEN EDITION</p>
    </div>
    <div id="chat-flow"></div>
    <div class="bottom-area">
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Bir şeyler yaz..." autocomplete="off">
            <button onclick="handleSend()" style="background:var(--gold); border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-weight: bold;">➔</button>
        </div>
    </div>
</div>

<script>
    const G_KEY = "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";
    let history = [];
    let savedChats = JSON.parse(localStorage.getItem('groq_v5_pro_chats')) || [];
    let currentId = null;

    function initApp() { renderHistory(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    async function handleSend() {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if(!text) return;

        document.getElementById('chat-dashboard').style.display = 'none';
        document.getElementById('chat-flow').style.display = 'flex';
        
        addMsg("user", text);
        inp.value = "";
        
        const f = document.getElementById('chat-flow');
        const lId = "L" + Date.now();
        const lDiv = document.createElement('div');
        lDiv.className = 'msg ai-box';
        lDiv.id = lId;
        lDiv.innerText = 'Bağlanıyor...';
        f.appendChild(lDiv);
        f.scrollTop = f.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${G_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    // MODEL LİMİTİ ÇABUK DOLMASIN DİYE DAHA HIZLI MODELLE DEĞİŞTİRİLDİ
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: "Sen NesinWasTaken tarafından yaratılmış samimi bir asistansın. Kısa cevaplar ver." },
                        ...history,
                        { role: "user", content: text }
                    ],
                    temperature: 0.6
                })
            });

            const data = await response.json();
            
            if (!response.ok) {
                if(data.error?.code === "rate_limit_exceeded") {
                    throw new Error("LİMİT DOLDU: Biraz beklemen gerekiyor.");
                }
                throw new Error("Sistem hatası.");
            }

            const aiRes = data.choices[0].message.content;
            lDiv.remove();
            addMsg("ai", aiRes);
            history.push({ role: "user", content: text }, { role: "assistant", content: aiRes });
            saveChat();
        } catch (e) {
            lDiv.innerText = "❌ " + e.message;
        }
    }

    function addMsg(role, text) {
        const f = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${role === 'user' ? 'user-box' : 'ai-box'}`;
        d.innerHTML = role === 'ai' ? (window.marked ? marked.parse(text) : text) : text;
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    function saveChat() {
        if(!currentId) currentId = Date.now();
        const title = history[0].content.substring(0, 20);
        const idx = savedChats.findIndex(c => c.id === currentId);
        if(idx > -1) savedChats[idx].messages = [...history];
        else savedChats.unshift({ id: currentId, title, messages: [...history] });
        localStorage.setItem('groq_v5_pro_chats', JSON.stringify(savedChats));
        renderHistory();
    }

    function renderHistory() {
        const l = document.getElementById('historyList');
        l.innerHTML = "";
        savedChats.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span onclick="loadChat(${i})">💬 ${c.title}</span>`;
            l.appendChild(div);
        });
    }

    function loadChat(i) {
        const c = savedChats[i];
        currentId = c.id; history = [...c.messages];
        document.getElementById('chat-dashboard').style.display = 'none';
        const f = document.getElementById('chat-flow');
        f.style.display = 'flex'; f.innerHTML = "";
        history.forEach(m => addMsg(m.role, m.content));
        if(window.innerWidth < 768) toggleSidebar();
    }

    function startNewChat() {
        history = []; currentId = null;
        document.getElementById('chat-flow').innerHTML = "";
        document.getElementById('chat-flow').style.display = 'none';
        document.getElementById('chat-dashboard').style.display = 'flex';
        if(window.innerWidth < 768) toggleSidebar();
    }

    function clearAll() { localStorage.removeItem('groq_v5_pro_chats'); savedChats = []; renderHistory(); startNewChat(); }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
